<mat-table [dataSource]="courses">

        <!-- Name Column -->
    <ng-container matColumnDef="_id">
      <mat-header-cell *matHeaderCellDef>ID</mat-header-cell>
      <mat-cell *matCellDef="let course">{{course._id}}</mat-cell>
    </ng-container>
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef>Curso</mat-header-cell>
      <mat-cell *matCellDef="let course">{{course.name}}</mat-cell>
    </ng-container>

    <!-- Category Column -->
    <ng-container matColumnDef="category">
      <mat-header-cell *matHeaderCellDef>Categoria</mat-header-cell>
      <mat-cell *matCellDef="let course" class="category-cell">
        {{ course.category }}
        <mat-icon aria-hidden="false" aria-label="Categoria do curso" fontIcon="{{course.category | category}}" class="category-icon"></mat-icon>
      </mat-cell>
    </ng-container>

        <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef class="action-column">
        <button matMiniFab color="accent" aria-label="Adicionar curso">
          <mat-icon (click)="onAdd()">add</mat-icon>
        </button>
      </mat-header-cell>
      <mat-cell *matCellDef="let course" class="action-column">
        <button matIconButton color="primary" aria-label="Editar curso">
          <mat-icon (click)="onEdit(course)">edit</mat-icon>
        </button>
         <button matIconButton color="warn" aria-label="Apagar curso">
          <mat-icon (click)="onDelete(course)">delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns"></mat-row>
  </mat-table>
